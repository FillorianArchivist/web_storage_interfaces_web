<!DOCTYPE html>
<html lang="pt-PT" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Registos - Arquivo Paroquial</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- open seadragon para visualização da imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@700&family=Esteban&family=Gloock&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#F8F6F2',
                        headerBg: '#F4F0EA',
                        cardBg: '#F2EEE9',
                        tableBg: '#EDE8E1',
                        borderLight: '#DCD6CD',
                        textDark: '#383838',
                        textMuted: '#7D736D',
                        brandRed: '#661515',
                        brandRedDark: '#4a0f0f'
                    },
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                        gloock: ['"Gloock"', 'serif'],
                        esteban: ['"Esteban"', 'serif'],
                        cormorant: ['"Cormorant"', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background font-esteban text-textDark antialiased min-h-screen flex flex-col">

    <!-- ==========================================
         HEADER
         ========================================== -->
       <nav class="navbar">
         <div class="nav-logo-area">
            <img src="https://placehold.co/61x74" alt="Logo">
            <span class="nav-title">Explorar Registos</span>
         </div>
         <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="explorar.html">Explorar Registos</a></li>
                <li><a href="contexto.html" class="active">Contexto Histórico</a></li>
                <li><a href="linhaTemporal.html">Linha Temporal</a></li>
                <li><a href="sobre.html">Sobre o Projeto</a></li>
         </ul>
       </nav>

    <!-- ==========================================
         MAIN CONTENT AREA
         ========================================== -->
    <main class="flex-grow max-w-[1400px] w-full mx-auto px-6 py-12 flex flex-col gap-8">

        <!-- Search Bar Section -->
        <section class="bg-cardBg border-[3px] border-borderLight rounded-xl shadow-[0_4px_13px_rgba(0,0,0,0.05)] p-4 md:p-6 flex items-center gap-4">
            <i class="ph ph-magnifying-glass text-4xl md:text-5xl text-textMuted ml-2"></i>
            <input 
                type="text" 
                id="search-input"
                placeholder="Pesquisar por nome, apelido, data..." 
                class="bg-transparent border-none w-full text-2xl md:text-4xl font-esteban text-textMuted placeholder-textMuted/60 focus:outline-none tracking-wide"
            >
        </section>

        <!-- Filters Section -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-6 bg-cardBg border-[3px] border-borderLight rounded-xl shadow-[0_4px_13px_rgba(0,0,0,0.05)] p-6">
            
            <!-- Filters Button -->
            <button class="md:col-span-2 bg-brandRed border-2 border-brandRed rounded-lg flex items-center justify-center gap-2 py-4 hover:bg-brandRedDark transition-colors">
                <i class="ph ph-sliders-horizontal text-white text-3xl"></i>
                <span class="text-white font-esteban text-2xl tracking-[2px]">Filtros</span>
            </button>

            <!-- Year Filter -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label class="font-playfair text-textMuted text-xl tracking-[1.5px]">ANO</label>
                <select class="bg-background border-[3px] border-borderLight rounded-lg p-4 font-esteban text-2xl text-textMuted focus:outline-none focus:border-brandRed cursor-pointer appearance-none">
                    <option>Todos os anos</option>
                    <option>1926</option>
                    <option>1927</option>
                    <option>1928</option>
                </select>
            </div>

            <!-- Gender Filter (Placeholder for future schema update) -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label class="font-playfair text-textMuted text-xl tracking-[1.5px]">SEXO</label>
                <select class="bg-background border-[3px] border-borderLight rounded-lg p-4 font-esteban text-2xl text-textMuted focus:outline-none focus:border-brandRed cursor-pointer appearance-none">
                    <option>Todos</option>
                    <option>Masculino</option>
                    <option>Feminino</option>
                </select>
            </div>

            <!-- Location Filter -->
            <div class="md:col-span-4 flex flex-col gap-2">
                <label class="font-playfair text-textMuted text-xl tracking-[1.5px]">LOCALIDADE</label>
                <select class="bg-background border-[3px] border-borderLight rounded-lg p-4 font-esteban text-2xl text-textMuted focus:outline-none focus:border-brandRed cursor-pointer appearance-none">
                    <option>Todas</option>
                    <option>Favaios</option>
                    <option>Sanfins do Douro</option>
                    <option>Alijó</option>
                </select>
            </div>
        </section>

        <!-- Data Table Section -->
        <section class="bg-tableBg border-[3px] border-borderLight rounded-xl shadow-[0_4px_13px_rgba(0,0,0,0.05)] overflow-hidden mt-4">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="border-b-[3px] border-borderLight">
                            <th class="p-6 font-playfair font-normal text-textMuted text-2xl tracking-[1.5px] w-2/5">NOME</th>
                            <th class="p-6 font-playfair font-normal text-textMuted text-2xl tracking-[1.5px] text-center w-1/5">IDADE</th>
                            <th class="p-6 font-playfair font-normal text-textMuted text-2xl tracking-[1.5px] text-center w-1/5">DATA MORTE</th>
                            <th class="p-6 font-playfair font-normal text-textMuted text-2xl tracking-[1.5px] text-center w-1/5">DATA SEPULTURA</th>
                        </tr>
                    </thead>
                    <tbody id="records-table-body" class="font-esteban text-textDark text-2xl">
                        <!-- JavaScript will inject rows here from Local Storage -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="no-results" class="hidden text-center py-16 text-textMuted">
                <i class="ph ph-magnifying-glass-minus text-6xl mb-4 opacity-50"></i>
                <p class="text-2xl">Nenhum registo encontrado.</p>
            </div>
        </section>

        <!-- Pagination Section -->
        <section class="flex items-center justify-between md:justify-center md:gap-12 py-8 mt-auto">
            <button class="bg-background border-[3px] border-borderLight rounded-xl px-8 py-4 font-esteban text-2xl text-textMuted opacity-50 cursor-not-allowed tracking-[1.8px]">
                Anterior
            </button>
            <span class="font-esteban text-2xl text-textMuted tracking-[1.8px]">
                Página 1 de 1
            </span>
            <button class="bg-background border-[3px] border-borderLight rounded-xl px-8 py-4 font-esteban text-2xl text-textDark hover:border-textMuted transition-colors tracking-[1.8px]">
                Seguinte
            </button>
        </section>

       <!-- ==========================================
             ADICIONAR A PARTIR DAQUI: VISUALIZADOR DOCUMENTAL
             ========================================== -->
        <section id="visualizador-documental" class="grid grid-cols-1 lg:grid-cols-2 gap-8 bg-cardBg border-[3px] border-borderLight rounded-xl shadow-[0_4px_13px_rgba(0,0,0,0.05)] p-6 hidden mt-8">
            
           <!-- Lado Esquerdo: Imagem do Manuscrito -->
            <div class="flex flex-col gap-4 border-r-0 lg:border-r-[3px] border-borderLight pr-0 lg:pr-6">
                <h3 class="font-playfair text-2xl text-textDark tracking-[1px] border-b-2 border-borderLight pb-2">Manuscrito Original</h3>
    
           <!-- Contentor do OpenSeadragon -->
                <div id="visualizador-osd" class="bg-background w-full h-[600px] border-2 border-borderLight rounded-lg overflow-hidden relative">
                </div>
            </div>

            <!-- Lado Direito: A Transcrição Dinâmica -->
            <div class="flex flex-col gap-4 pl-0 lg:pl-2">
                <h3 class="font-playfair text-2xl text-brandRed tracking-[1px] border-b-2 border-borderLight pb-2">Transcrição Diplomática</h3>
                
                <!-- ESTE É O "PALCO": A div onde o XSLTProcessor vai injetar o HTML resultante -->
                <div id="area-transcricao" class="overflow-y-auto h-[600px] pr-4 font-esteban text-xl leading-relaxed text-textDark">
                    <!-- Conteúdo vazio, aguardando o JavaScript -->
                </div>
            </div>
        </section>

    </main>
    
    <!-- ==========================================
         JAVASCRIPT LOGIC
         ========================================== -->
    <script>
        // Array global que armazena os metadados extraídos dos ficheiros XML
        let allRecords = []; 
        
        // Variável global para guardar a instância do visualizador
        let visualizadorImagem;
        
        // Lista dos ficheiros XML alojados no repositório (public e public/data)
        const ficheirosXML = [
            'public/template-assento.xml',
            // No futuro, adicione novos documentos aqui, ex: 'public/data/assento-1928-001.xml'
        ];

        // 1. Initialize Page (Lendo múltiplos XMLs simultaneamente)
        async function initPage() {
            try {
                // Limpa os registos antigos e prepara o novo array
                allRecords = [];

                // Faz o fetch de TODOS os ficheiros da lista ao mesmo tempo
                const promessasFetch = ficheirosXML.map(caminho => fetch(caminho));
                const respostas = await Promise.all(promessasFetch);

                for (let i = 0; i < respostas.length; i++) {
                    const resposta = respostas[i];
                    const caminhoFicheiro = ficheirosXML[i]; // Guarda o caminho do ficheiro atual

                    if (!resposta.ok) {
                        console.warn(`Não foi possível carregar: ${caminhoFicheiro}`);
                        continue;
                    }

                    const textoXML = await resposta.text();
                    const xmlDoc = new DOMParser().parseFromString(textoXML, "text/xml");

                    // Procura todos os nós <entry> no ficheiro XML atual
                    const entradas = xmlDoc.querySelectorAll("entry");

                    entradas.forEach(entrada => {
                        // Extrai o Nome do Falecido
                        const deceasedNode = entrada.querySelector("persName[type='deceased']");
                        const forename = deceasedNode ? deceasedNode.querySelector("forename")?.textContent : "";
                        const surname = deceasedNode ? deceasedNode.querySelector("surname")?.textContent : "";
                        
                        // Extrai a Data de Óbito e Sepultura
                        const deathNode = entrada.querySelector("death");
                        const dataMorte = deathNode ? deathNode.getAttribute("when") : "";
                        
                        const funeralNode = entrada.querySelector("funeral");
                        const dataSepulturaXML = funeralNode ? funeralNode.getAttribute("when") : null;

                        // Extrai a Idade
                        const ageNode = entrada.querySelector("age");
                        const idadeStr = ageNode ? ageNode.getAttribute("value") : "";

                        // Limpeza de espaços (ex: "Martha" + "da Conceição")
                        const nomeFormatado = `${forename} ${surname}`.replace(/\s+/g, ' ').trim();

                        // Adiciona o assento ao array de dados da interface
                        allRecords.push({
                            nome: nomeFormatado,
                            idade: idadeStr,
                            data: dataMorte,
                            sepultura: dataSepulturaXML,
                            // CRUCIAL: Guarda a proveniência deste registo para o XSLT saber o que abrir!
                            ficheiroOrigem: caminhoFicheiro 
                        });
                    });
                }

                // Ordena os registos por data do mais antigo para o mais recente
                allRecords.sort((a, b) => new Date(a.data) - new Date(b.data));
                
                // Constrói a tabela e ativa a barra de pesquisa
                renderTable(allRecords);
                setupSearch();

            } catch (erro) {
                console.error("Erro na leitura do repositório documental: ", erro);
                document.getElementById('records-table-body').innerHTML = 
                    `<tr><td colspan="4" class="p-6 text-center text-brandRed">Erro ao carregar os dados arquivísticos.</td></tr>`;
            }
        }

        // 3. FUNÇÃO DO OPENSEADRAGON
        function inicializarVisualizadorImagem() {
            visualizadorImagem = OpenSeadragon({
                id: "visualizador-osd", // A div que criámos no "Palco"
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: {
                    type: 'image',
                    url: 'Favaios.png' //
                },
                showNavigator: true,
                navigatorPosition: "BOTTOM_RIGHT",
                zoomInButton: true,
                zoomOutButton: true
            });
        }
        
         // 2. Render Table Rows
        function renderTable(recordsToRender) {
            const tbody = document.getElementById('records-table-body');
            const noResults = document.getElementById('no-results');
            
            tbody.innerHTML = '';

            if (recordsToRender.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');

                recordsToRender.forEach((record, index) => {
                    const tr = document.createElement('tr');
                    
                    // 1ª ALTERAÇÃO: Adicionamos classes base para feedback visual de clique
                    let baseClasses = "hover:bg-headerBg cursor-pointer transition-colors duration-200 ";
                    
                    // Mantém a lógica do Figma de separar por caixas (borders)
                    if (index !== recordsToRender.length - 1) {
                        tr.className = baseClasses + "border-b-[3px] border-borderLight bg-cardBg";
                    } else {
                        tr.className = baseClasses + "bg-cardBg";
                    }
                    
                    // 2ª ALTERAÇÃO: Formatação de datas mais segura a partir dos dados do XML
                    let formattedDate = "N/D";
                    if (record.data) {
                        const dObj = new Date(record.data);
                        if (!isNaN(dObj)) formattedDate = dObj.toLocaleDateString('pt-PT');
                    }

                    let sepulturaDate = "N/A";
                    if (record.sepultura) {
                        const sObj = new Date(record.sepultura);
                        if (!isNaN(sObj)) sepulturaDate = sObj.toLocaleDateString('pt-PT');
                    }

                    tr.innerHTML = `
                        <td class="p-6 tracking-[1.5px]">${record.nome}</td>
                        <td class="p-6 text-center tracking-[1.5px]">${record.idade} anos</td>
                        <td class="p-6 text-center tracking-[1.5px]">${formattedDate}</td>
                        <td class="p-6 text-center tracking-[1.5px] text-textMuted">${sepulturaDate}</td>
                    `;
                    
                    // 3ª ALTERAÇÃO (A MAIS IMPORTANTE): O evento que aciona o XSLT ao clicar na linha
                    tr.addEventListener('click', () => {
                        // Passamos o caminho do XML específico para a função que fará o processamento
                        carregarRegistoDiplomatico(record.ficheiroOrigem);
                    });

                    // Injeta a linha construída e interativa na tabela
                    tbody.appendChild(tr);
                });
            }
        }

        // 3. Simple Search Logic (Live Filtering)
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allRecords.filter(record => {
                    return record.nome.toLowerCase().includes(term) || 
                           record.data.includes(term);
                });
                renderTable(filtered);
            });
        }

        // 4. Motor de Transformação XSLT (Método 2)
        async function carregarRegistoDiplomatico(recordData) {
            try {
                // Revela a secção do visualizador documental criada anteriormente
                const visualizador = document.getElementById('visualizador-documental');
                if (visualizador) visualizador.classList.remove('hidden');

                const areaTranscricao = document.getElementById("area-transcricao");
                areaTranscricao.innerHTML = '<div class="flex h-full items-center justify-center opacity-50"><i class="ph ph-spinner-gap animate-spin text-4xl mr-2"></i> A carregar transcrição estruturada...</div>';

                // Busca o ficheiro XML da pasta public do repositório
                const respostaXML = await fetch('public/template-assento.xml');
                if (!respostaXML.ok) throw new Error("XML não encontrado.");
                const textoXML = await respostaXML.text();
                const xml = new DOMParser().parseFromString(textoXML, "text/xml");

                // Busca a folha XSLT da pasta public (que deverá ser adicionada ao repositório)
                const respostaXSLT = await fetch('public/transformacao-assento.xsl');
                if (!respostaXSLT.ok) throw new Error("XSLT não encontrado.");
                const textoXSLT = await respostaXSLT.text();
                const xslt = new DOMParser().parseFromString(textoXSLT, "text/xml");

                // Executa a transformação XSLT nativa no browser
                const processador = new XSLTProcessor();
                processador.importStylesheet(xslt);
                const fragmentoHTML = processador.transformToFragment(xml, document);

                // Injeta o HTML processado no palco
                areaTranscricao.innerHTML = ''; 
                areaTranscricao.appendChild(fragmentoHTML);

                // Opcional: Rola a página suavemente até à transcrição para guiar o olhar do utilizador
                visualizador.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (erro) {
                console.error("Erro no processamento XSLT:", erro);
                document.getElementById("area-transcricao").innerHTML = 
                    `<p class="text-brandRed p-4">Erro ao processar a anotação diplomática. Verifique se os ficheiros existem na pasta public.</p>`;
            }
        }

        // Run when page loads
        window.onload = initPage;
    </script>
</body>
</html>
