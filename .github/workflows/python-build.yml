name: Python XML to JSON Pipeline

# 1. THE TRIGGER
on:
  push:
    branches:
      - main
    paths:
      - 'data/manuscript.xml' 

permissions:
  contents: write

# 2. THE INSTRUCTIONS
jobs:
  validate-and-build:
    runs-on: ubuntu-latest 

    steps:
      # A. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # B. Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # C. Install libraries from our text file
      - name: Install dependencies
        run: pip install -r requirements.txt

      # D. Run our engine
      - name: Run Python build script
        run: python scripts/build.py

      # E. Save the results
      - name: Commit and push generated files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/manuscript.json public/data/version.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-build: Validated and updated JSON"
          git push
